<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hệ thống Quản lý Thiết bị</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:#f0f2f5;color:#1a1a2e}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
input,select,textarea,button{font-family:inherit;font-size:14px}
/* ===== TOKENS ===== */
:root{
  --blue:#3b82f6;--blue2:#2563eb;--purple:#7c3aed;--green:#059669;--amber:#d97706;--red:#dc2626;--teal:#0891b2;
  --bg:#f0f2f5;--card:#ffffff;--sidebar:#1e293b;--sidebar2:#0f172a;
  --border:#e2e8f0;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --r:8px;--r2:12px;
}
/* ===== LOGIN ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);z-index:999}
.login-box{width:400px;background:#fff;border-radius:16px;padding:2.5rem;box-shadow:0 25px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:.75rem}
.login-logo h1{font-size:20px;font-weight:700;color:var(--text)}
.login-logo p{font-size:12px;color:var(--text2);margin-top:2px}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);display:block;margin-bottom:5px}
.field-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);outline:none;transition:.2s;background:#f8fafc}
.field-input:focus{border-color:var(--blue);background:#fff}
.fgroup{margin-bottom:1rem}
.role-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.rbtn{padding:10px 4px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;font-size:12px;font-weight:600;background:#f8fafc;color:var(--text2);transition:.15s;line-height:1.4}
.rbtn:hover{border-color:#93c5fd;color:var(--blue)}
.rbtn.r-kho{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.rbtn.r-ql{border-color:var(--purple);background:#f5f3ff;color:var(--purple)}
.rbtn.r-dv{border-color:var(--green);background:#ecfdf5;color:var(--green)}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.login-btn:hover{opacity:.9}
.login-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:9px 12px;border-radius:var(--r);font-size:13px;margin-bottom:1rem;display:none}
.login-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:.75rem}
/* ===== APP SHELL ===== */
#app{display:none;height:100vh;flex-direction:column}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:12px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tb-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--text)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:20px;background:#f8fafc}
.user-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.av-kho{background:#dbeafe;color:var(--blue)}.av-ql{background:#ede9fe;color:var(--purple)}.av-dv{background:#d1fae5;color:var(--green)}
.user-info .uname{font-size:13px;font-weight:600}.user-info .urole{font-size:11px;color:var(--text2)}
.btn-logout{padding:6px 14px;border:1px solid #fecaca;border-radius:var(--r);color:var(--red);background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn-logout:hover{background:#fef2f2}
.app-body{display:flex;flex:1;overflow:hidden}
/* ===== SIDEBAR ===== */
.sidebar{width:230px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.sb-section{padding:.75rem .75rem .25rem}
.sb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b;padding:0 .5rem;margin-bottom:4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:.12s;position:relative}
.sb-item:hover{background:rgba(255,255,255,.07);color:#e2e8f0}
.sb-item.active{background:rgba(59,130,246,.2);color:#93c5fd}
.sb-icon{font-size:15px;width:20px;text-align:center}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.1);color:#94a3b8;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-item.active .sb-badge{background:rgba(59,130,246,.3);color:#93c5fd}
/* ===== MAIN ===== */
.main{flex:1;overflow-y:auto;padding:1.5rem}
/* ===== COMMON COMPONENTS ===== */
.page-hd{margin-bottom:1.25rem}
.page-hd h2{font-size:20px;font-weight:700;margin-bottom:3px}
.page-hd p{font-size:13px;color:var(--text2)}
.prereq{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r);font-size:13px;color:#92400e;margin-bottom:1.25rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.btn{padding:7px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-warning{background:var(--amber);color:#fff}.btn-warning:hover{opacity:.9}
.btn-ghost{background:#fff;color:var(--text2);border-color:var(--border)}.btn-ghost:hover{background:#f1f5f9;color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.25rem}
.stat-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:12px;color:var(--text2)}
.stat.blue .stat-num{color:var(--blue)}.stat.green .stat-num{color:var(--green)}.stat.amber .stat-num{color:var(--amber)}.stat.red .stat-num{color:var(--red)}.stat.purple .stat-num{color:var(--purple)}
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.b-blue{background:#dbeafe;color:var(--blue)}.b-green{background:#d1fae5;color:var(--green)}.b-red{background:#fee2e2;color:var(--red)}.b-amber{background:#fef3c7;color:var(--amber)}.b-purple{background:#ede9fe;color:var(--purple)}.b-teal{background:#cffafe;color:var(--teal)}.b-gray{background:#f1f5f9;color:#64748b}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:var(--r2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.frow.full{grid-template-columns:1fr}
/* FORM */
select.field-input option{background:#fff}
textarea.field-input{resize:vertical;min-height:80px}
.val-err{font-size:12px;color:var(--red);margin-top:3px}
/* FLOW STEP (sequence) */
.seq-flow{display:flex;flex-direction:column;gap:0}
.seq-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.seq-step:last-child{border-bottom:none}
.seq-num{min-width:22px;height:22px;border-radius:50%;background:#dbeafe;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.seq-alt{margin:6px 0;border-left:2px solid var(--border);padding-left:10px}
.seq-alt-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeSlide .3s ease;display:flex;align-items:center;gap:8px}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.t-success{background:var(--green);color:#fff}.t-error{background:var(--red);color:#fff}.t-info{background:var(--blue);color:#fff}
/* TABS inside page */
.ptabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:0}
.ptab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.ptab:hover{color:var(--text)}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue)}
.ptab-content{display:none}.ptab-content.active{display:block}
/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--text3)}
.empty .empty-icon{font-size:40px;margin-bottom:.5rem}
.empty p{font-size:13px}
/* DETAIL VIEW */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.info-field label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:3px;display:block}
.info-field p{font-size:14px;font-weight:500}
@media(max-width:768px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .frow{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">📦</div>
      <h1>Quản lý Thiết bị</h1>
      <p>Equipment Management System</p>
    </div>
    <div class="login-err" id="lerr">Tài khoản hoặc mật khẩu không đúng.</div>
    <div class="fgroup">
      <label class="field-label">Vai trò</label>
      <div class="role-row">
        <div class="rbtn r-kho" id="rb-kho" onclick="selRole('kho')">📦<br>Nhân viên kho</div>
        <div class="rbtn" id="rb-ql" onclick="selRole('ql')">👔<br>Quản lý</div>
        <div class="rbtn" id="rb-dv" onclick="selRole('dv')">🏢<br>Đơn vị SD</div>
      </div>
    </div>
    <div class="fgroup"><label class="field-label">Tài khoản</label><input class="field-input" id="lu" placeholder="Nhập tên đăng nhập..."></div>
    <div class="fgroup"><label class="field-label">Mật khẩu</label><input class="field-input" id="lp" type="password" placeholder="Nhập mật khẩu..."></div>
    <button class="login-btn" onclick="login()">Đăng nhập vào hệ thống</button>
    <p class="login-hint">Demo: tài khoản bất kỳ • mật khẩu: <b>123</b></p>
  </div>
</div>
<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">📦</div>
    <div class="tb-title">Quản lý Thiết bị</div>
    <div class="tb-right">
      <div class="user-pill">
        <div class="user-av" id="av"></div>
        <div class="user-info"><div class="uname" id="uname"></div><div class="urole" id="urole"></div></div>
      </div>
      <button class="btn-logout" onclick="logout()">← Đăng xuất</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar" id="sb"></div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
/* ═══════════════════════════════
   STORAGE
═══════════════════════════════ */
const STORE_KEY = 'qlthietbi_v1';
function loadStore(){
  try{return JSON.parse(localStorage.getItem(STORE_KEY))||initStore();}catch{return initStore();}
}
function saveStore(){localStorage.setItem(STORE_KEY,JSON.stringify(S));}
function initStore(){
  return {
    thietbi:[
      {id:'TB001',ten:'Máy tính Dell OptiPlex',loai:'Máy tính',so_luong:10,so_luong_kho:8,don_vi:'Cái',tinh_trang:'Tốt',gia:15000000,ghichu:''},
      {id:'TB002',ten:'Máy chiếu Epson',loai:'Máy chiếu',so_luong:3,so_luong_kho:3,don_vi:'Cái',tinh_trang:'Tốt',gia:12000000,ghichu:''},
      {id:'TB003',ten:'Máy in HP LaserJet',loai:'Máy in',so_luong:5,so_luong_kho:4,don_vi:'Cái',tinh_trang:'Tốt',gia:5500000,ghichu:''},
      {id:'TB004',ten:'Điều hoà Daikin 1.5HP',loai:'Điều hoà',so_luong:6,so_luong_kho:6,don_vi:'Cái',tinh_trang:'Tốt',gia:9000000,ghichu:''},
      {id:'TB005',ten:'Tivi Samsung 55"',loai:'Tivi',so_luong:2,so_luong_kho:2,don_vi:'Cái',tinh_trang:'Tốt',gia:14000000,ghichu:''},
    ],
    nhap_kho:[],
    xuat_kho:[],
    kiem_ke:[],
    yeu_cau:[
      {id:'YC001',tieu_chi:'Máy tính Dell OptiPlex',tb_id:'TB001',so_luong:2,don_vi_yc:'Phòng Kế toán',nguoi_tao:'NV01',ngay_tao:'2025-01-10',trang_thai:'Đang chờ duyệt',ghichu:'Phục vụ công việc hàng ngày'},
      {id:'YC002',tieu_chi:'Máy chiếu Epson',tb_id:'TB002',so_luong:1,don_vi_yc:'Phòng Họp A',nguoi_tao:'NV02',ngay_tao:'2025-01-11',trang_thai:'Đã duyệt',ghichu:'Họp hội đồng'},
    ],
    bo_sung:[],
    bao_tri:[
      {id:'BT001',tb_id:'TB001',ten_tb:'Máy tính Dell OptiPlex',loai:'Bảo dưỡng định kỳ',ngay_lap:'2025-01-05',ngay_du_kien:'2025-01-20',trang_thai:'Đang thực hiện',ky_thuat_vien:'Nguyễn Văn A',chi_phi:500000,ghichu:''},
    ],
    tb_hong:[
      {id:'TH001',tb_id:'TB003',ten_tb:'Máy in HP LaserJet',mo_ta_loi:'Kẹt giấy, không in được',nguoi_ghi_nhan:'QL01',ngay_ghi:'2025-01-09',tinh_trang_danh_gia:'',trang_thai:'Chờ đánh giá',lich_sua_chua:'',ghichu:''},
    ],
    nha_cung_cap:[
      {id:'NCC001',ten:'Công ty CP Thiết bị Văn phòng ABC',ma_so_thue:'0123456789',dien_thoai:'0901234567',email:'abc@email.com',dia_chi:'123 Nguyễn Văn Linh, Q7, TP.HCM',nguoi_lien_he:'Trần Thị B',trang_thai:'Đang hợp tác',ghichu:''},
      {id:'NCC002',ten:'Công ty TNHH Công nghệ XYZ',ma_so_thue:'9876543210',dien_thoai:'0912345678',email:'xyz@tech.vn',dia_chi:'456 Lê Văn Việt, Q9, TP.HCM',nguoi_lien_he:'Lê Văn C',trang_thai:'Đang hợp tác',ghichu:''},
    ],
    hop_dong:[
      {id:'HD001',ncc_id:'NCC001',so_hop_dong:'HĐ-2024-001',ngay_ky:'2024-01-15',ngay_het_han:'2025-01-15',gia_tri:250000000,noi_dung:'Cung cấp máy tính và thiết bị văn phòng',trang_thai:'Còn hiệu lực'},
    ],
    thanh_toan:[
      {id:'TT001',ncc_id:'NCC001',hop_dong_id:'HD001',so_tien:125000000,ngay_thanh_toan:'2024-07-15',hinh_thuc:'Chuyển khoản',ghi_chu:'Thanh toán đợt 1'},
    ],
    tai_chinh:[],
    ngan_sach:{tong:500000000,da_su_dung:250000000},
    bao_cao:[],
    seq_counter:{tb:6,nhap:1,xuat:1,yk:1,yc:3,bs:1,bt:2,th:2,ncc:3,hd:2,tt:2,tc:1,bc:1,kk:1},
  };
}

let S = loadStore();
if(!S.ngan_sach)S.ngan_sach={tong:500000000,da_su_dung:250000000};

function nextId(prefix,key){
  S.seq_counter[key]=(S.seq_counter[key]||1)+1;
  const n=String(S.seq_counter[key]).padStart(3,'0');
  saveStore();
  return prefix+n;
}
function fmt(n){return new Intl.NumberFormat('vi-VN').format(n)+'đ';}
function fmtNum(n){return new Intl.NumberFormat('vi-VN').format(n);}
function today(){return new Date().toISOString().split('T')[0];}

/* ═══════════════════════════════
   AUTH
═══════════════════════════════ */
let currentRole='kho',currentUser='';
const ROLES={kho:{lbl:'Nhân viên kho',avcls:'av-kho'},ql:{lbl:'Quản lý',avcls:'av-ql'},dv:{lbl:'Đơn vị sử dụng',avcls:'av-dv'}};

function selRole(r){
  currentRole=r;
  ['kho','ql','dv'].forEach(x=>{document.getElementById('rb-'+x).className='rbtn';});
  const cls={kho:'r-kho',ql:'r-ql',dv:'r-dv'}[r];
  document.getElementById('rb-'+r).classList.add(cls);
}
function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  if(!u||p!=='123'){document.getElementById('lerr').style.display='block';return;}
  document.getElementById('lerr').style.display='none';
  currentUser=u;
  document.getElementById('login').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  const r=ROLES[currentRole];
  const av=document.getElementById('av');
  av.className='user-av '+r.avcls;
  av.textContent=u.substring(0,2).toUpperCase();
  document.getElementById('uname').textContent=u;
  document.getElementById('urole').textContent=r.lbl;
  buildSidebar();
  nav('dashboard');
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
}

/* ═══════════════════════════════
   SIDEBAR & NAV
═══════════════════════════════ */
const NAVS={
  kho:[
    {id:'dashboard',icon:'🏠',lbl:'Dashboard'},
    {id:'thietbi',icon:'📋',lbl:'Danh sách thiết bị'},
    {id:'nhapkho',icon:'📥',lbl:'Nhập kho'},
    {id:'xuatkho',icon:'📤',lbl:'Xuất kho'},
    {id:'kiemke',icon:'🔍',lbl:'Kiểm kê thiết bị'},
    {id:'baocao',icon:'📊',lbl:'Báo cáo'},
  ],
  ql:[
    {id:'dashboard',icon:'🏠',lbl:'Dashboard'},
    {id:'thietbi',icon:'📋',lbl:'Danh sách thiết bị'},

    {id:'baotri',icon:'🔧',lbl:'Quản lý bảo trì'},

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className='toast-item t-'+type;
  const icon={success:'✅',error:'❌',info:'ℹ️'}[type];
  el.innerHTML=icon+' '+msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function saveEditTB(id){
  const t=S.thietbi.find(x=>x.id===id);if(!t)return;
  t.ten=v('f-ten');t.loai=v('f-loai');t.so_luong=parseInt(v('f-sl'))||0;t.so_luong_kho=parseInt(v('f-slk'))||0;t.gia=parseInt(v('f-gia'))||0;t.tinh_trang=v('f-tt');t.ghichu=v('f-gc');
  if(!t.ten||!t.loai){toast('Tên và loại không được để trống','error');return;}
  saveStore();closeModal();toast('Đã cập nhật thiết bị '+t.ten);pgThietBi();
}

function formNhapKho(){
  const tbOpts=S.thietbi.map(t=>`<option value="${t.id}">${t.id} — ${t.ten}</option>`).join('');
  const nccOpts='<option value="">-- Chọn nhà cung cấp --</option>'+S.nha_cung_cap.map(n=>`<option value="${n.ten}">${n.ten}</option>`).join('');
  openModal(`<div class="modal"><div class="modal-hd"><h3>📥 Tạo phiếu nhập kho</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">

    <div><label class="field-label">Ngày nhập *</label><input class="field-input" id="f-ngay" type="date" value="${today()}"></div></div>

  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-success" onclick="saveNhapKho()">✅ Xác nhận nhập kho</button></div></div>`);
}
function saveNhapKho(){
  const tbid=v('f-tbid'),sl=parseInt(v('f-sl'))||0,dg=parseInt(v('f-dg'))||0,ncc=v('f-ncc'),ngay=v('f-ngay'),gc=v('f-gc');
  if(!tbid||sl<1||!ngay){toast('Vui lòng điền đầy đủ thông tin','error');return;}
  const tb=S.thietbi.find(t=>t.id===tbid);if(!tb){toast('Thiết bị không tồn tại','error');return;}
  S.seq_counter.nhap=(S.seq_counter.nhap||0)+1;
  const id='NK'+String(S.seq_counter.nhap).padStart(3,'0');
  S.nhap_kho.push({id,tb_id:tbid,ten_tb:tb.ten,so_luong:sl,don_vi:tb.don_vi,don_gia:dg,nha_cung_cap:ncc,nguoi_nhap:currentUser,ngay_nhap:ngay,ghichu:gc});
  tb.so_luong+=sl;tb.so_luong_kho+=sl;
  saveStore();closeModal();toast('Đã nhập kho '+sl+' '+tb.don_vi+' '+tb.ten);pgNhapKho();
}

function fillXuatFromYC(){
  const sel=document.getElementById('f-ycid');
  const opt=sel.options[sel.selectedIndex];

  const dv=opt.getAttribute('data-dv');
  const tb=S.thietbi.find(t=>t.id===tbId);
  if(tb){document.getElementById('f-tb-name').value=tb.ten;document.getElementById('f-sl').value=sl;document.getElementById('f-dvnhan').value=dv||'';}

function saveXuatKho(){
  const ycid=v('f-ycid'),sl=parseInt(v('f-sl'))||0,dvnhan=v('f-dvnhan'),ngay=v('f-ngay'),gc=v('f-gc');
  const warn=document.getElementById('xk-warn');
  warn.style.display='none';
  if(!ycid){toast('Vui lòng chọn yêu cầu đã duyệt','error');return;}
  const yc=S.yeu_cau.find(y=>y.id===ycid);
  if(!yc||yc.trang_thai!=='Đã duyệt'){warn.style.display='block';warn.textContent='❌ Yêu cầu chưa được duyệt. Không thể xuất kho.';return;}
  const tb=S.thietbi.find(t=>t.id===yc.tb_id);
  if(!tb){toast('Thiết bị không tồn tại','error');return;}
  if(tb.so_luong_kho<sl){warn.style.display='block';warn.textContent=`❌ Không đủ số lượng trong kho. Hiện có: ${tb.so_luong_kho}, yêu cầu: ${sl}`;return;}
  S.seq_counter.xuat=(S.seq_counter.xuat||0)+1;
  const id='XK'+String(S.seq_counter.xuat).padStart(3,'0');
  S.xuat_kho.push({id,tb_id:tb.id,ten_tb:tb.ten,so_luong:sl,don_vi:tb.don_vi,don_vi_nhan:dvnhan||yc.don_vi_yc,yc_id:ycid,nguoi_xuat:currentUser,ngay_xuat:ngay,ghichu:gc});
  tb.so_luong_kho-=sl;
  yc.trang_thai='Đã xuất kho';
  saveStore();closeModal();toast('Xuất kho thành công '+sl+' '+tb.don_vi+' '+tb.ten);pgXuatKho();
}

function duyetYC(id,action){
  const yc=S.yeu_cau.find(y=>y.id===id);if(!yc)return;

    const tb=S.thietbi.find(t=>t.id===yc.tb_id);

    yc.trang_thai='Từ chối';toast('Đã từ chối yêu cầu '+id,'info');
  }
  saveStore();pgDuyetYC();
}

    <td><b>${b.id}</b></td><td>${b.loai_tb}</td><td style="text-align:center">${b.so_luong}</td>
    <td>${fmt(b.du_kien_gia)}</td><td>${b.ly_do}</td><td>${b.nguoi_tao}</td>
    <td><div style="display:flex;gap:4px"><button class="btn btn-success btn-sm" onclick="duyetBS('${b.id}','duyet')">✅ Duyệt</button><button class="btn btn-danger btn-sm" onclick="duyetBS('${b.id}','tuchoi')">❌</button></div></td>
  </tr>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="page-hd"><h2>💰 Quản lý tài chính nhập thiết bị</h2></div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1.25rem">
      <div class="card-title">Ngân sách thiết bị</div>
      <div class="stats-row" style="margin-bottom:.75rem">
        <div class="stat green"><div class="stat-num">${fmt(b.tong)}</div><div class="stat-lbl">Tổng ngân sách</div></div>
        <div class="stat red"><div class="stat-num">${fmt(b.da_su_dung)}</div><div class="stat-lbl">Đã sử dụng</div></div>
        <div class="stat blue"><div class="stat-num">${fmt(b.tong-b.da_su_dung)}</div><div class="stat-lbl">Còn lại</div></div>
        <div class="stat ${pct>80?'red':'amber'}"><div class="stat-num">${pct}%</div><div class="stat-lbl">Tỷ lệ sử dụng</div></div>
      </div>
      <div style="height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct>80?'var(--red)':pct>60?'var(--amber)':'var(--green)'};border-radius:6px;transition:.3s"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:.75rem">
        <button class="btn btn-ghost btn-sm" onclick="editNganSach()">⚙️ Cập nhật ngân sách</button>
      </div>
    </div>
    <div class="ptabs">
      <div class="ptab active" onclick="switchTab(this,'tc-tc')">Phiếu tài chính</div>
      <div class="ptab" onclick="switchTab(this,'tc-bs')">Yêu cầu bổ sung TB <span class="badge b-amber" style="margin-left:4px">${S.bo_sung.filter(b=>b.trang_thai==='Đang chờ duyệt').length}</span></div>
    </div>
    <div id="tc-tc" class="ptab-content active">
      <div style="margin-bottom:1rem"><button class="btn btn-primary" onclick="taoPhieuTC()">+ Tạo phiếu tài chính</button></div>
      <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Mã</th><th>Loại</th><th>Mục đích</th><th>Số tiền</th><th>Người tạo</th><th>Ngày</th><th>TT</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8"><div class="empty"><div class="empty-icon">💰</div><p>Chưa có phiếu tài chính</p></div></td></tr>'}</tbody></table></div></div>
    </div>
    <div id="tc-bs" class="ptab-content">
      <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Mã</th><th>Loại TB</th><th>SL</th><th>Dự kiến giá</th><th>Lý do</th><th>Người tạo</th><th>Hành động</th></tr></thead>
      <tbody>${bsRows||'<tr><td colspan="7"><div class="empty"><div class="empty-icon">✅</div><p>Không có yêu cầu bổ sung chờ duyệt</p></div></td></tr>'}</tbody></table></div></div>
    </div>`;
}
function editNganSach(){
  const b=S.ngan_sach;
  openModal(`<div class="modal"><div class="modal-hd"><h3>⚙️ Cập nhật ngân sách</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="frow"><div><label class="field-label">Tổng ngân sách (VND)</label><input class="field-input" id="f-tong" type="number" value="${b.tong}"></div>
    <div><label class="field-label">Đã sử dụng (VND)</label><input class="field-input" id="f-dusd" type="number" value="${b.da_su_dung}"></div></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveNganSach()">💾 Lưu</button></div></div>`);
}
function saveNganSach(){
  S.ngan_sach.tong=parseInt(v('f-tong'))||0;S.ngan_sach.da_su_dung=parseInt(v('f-dusd'))||0;
  saveStore();closeModal();toast('Đã cập nhật ngân sách');pgTaiChinh();
}
function taoPhieuTC(){
  openModal(`<div class="modal"><div class="modal-hd"><h3>💰 Tạo phiếu tài chính</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="frow"><div><label class="field-label">Loại *</label><select class="field-input" id="f-loai"><option>Cấp phát</option><option>Yêu cầu cấp</option><option>Hoàn trả</option></select></div>
    <div><label class="field-label">Số tiền (VND) *</label><input class="field-input" id="f-st" type="number" min="0" value="0"></div></div>
    <div class="frow full"><label class="field-label">Mục đích *</label><input class="field-input" id="f-md" placeholder="Mô tả mục đích..."></div>
    <div class="frow full"><label class="field-label">Ghi chú</label><textarea class="field-input" id="f-gc" placeholder="Ghi chú thêm..."></textarea></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="savePhieuTC()">📤 Gửi yêu cầu</button></div></div>`);
}
function savePhieuTC(){
  const loai=v('f-loai'),st=parseInt(v('f-st'))||0,md=v('f-md');
  if(st<=0||!md){toast('Vui lòng điền đầy đủ','error');return;}
  S.seq_counter.tc=(S.seq_counter.tc||0)+1;
  const id='TC'+String(S.seq_counter.tc).padStart(3,'0');
  S.tai_chinh.push({id,loai,so_tien:st,muc_dich:md,nguoi_tao:currentUser,ngay:today(),trang_thai:loai==='Cấp phát'?'Đã duyệt':'Đang chờ',ghichu:v('f-gc')});
  if(loai==='Cấp phát')S.ngan_sach.da_su_dung+=st;
  saveStore();closeModal();toast('Đã tạo phiếu tài chính '+id);pgTaiChinh();
}
function duyetTC(id,action){
  const t=S.tai_chinh.find(x=>x.id===id);if(!t)return;
  if(action==='duyet'){t.trang_thai='Đã duyệt';S.ngan_sach.da_su_dung+=t.so_tien;toast('Đã duyệt phiếu '+id+' ✅');}
  else{t.trang_thai='Từ chối';toast('Đã từ chối phiếu '+id);}
  saveStore();pgTaiChinh();
}
function duyetBS(id,action){
  const b=S.bo_sung.find(x=>x.id===id);if(!b)return;
  if(action==='duyet'){b.trang_thai='Đã duyệt';toast('Đã duyệt yêu cầu bổ sung '+id+' ✅');}
  else{b.trang_thai='Từ chối';toast('Đã từ chối yêu cầu '+id);}
  saveStore();pgTaiChinh();
}

/* ═══════════════════════════════
   BỔ SUNG THIẾT BỊ (đơn vị SD)
═══════════════════════════════ */
function pgBoSungTB(){
  const myBS=S.bo_sung.filter(b=>b.nguoi_tao===currentUser);
  const rows=myBS.slice().reverse().map(b=>`<tr>
    <td><b>${b.id}</b></td><td>${b.loai_tb}</td><td style="text-align:center">${b.so_luong}</td>
    <td>${fmt(b.du_kien_gia)}</td><td style="font-size:12px">${b.ly_do}</td><td>${b.ngay_tao}</td>
    <td><span class="badge ${b.trang_thai==='Đã duyệt'?'b-green':b.trang_thai==='Từ chối'?'b-red':'b-amber'}">${b.trang_thai}</span></td>
  </tr>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="page-hd"><h2>➕ Yêu cầu bổ sung thiết bị mới</h2><p>Đề xuất bổ sung loại thiết bị chưa có trong hệ thống</p></div>
    <div class="card" style="max-width:560px;margin-bottom:1.25rem">
      <div class="card-title">Tạo yêu cầu bổ sung mới</div>
      <div class="fgroup"><label class="field-label">Loại thiết bị cần bổ sung *</label><input class="field-input" id="bs-loai" placeholder="Tên loại thiết bị mới..."></div>
      <div class="frow"><div><label class="field-label">Số lượng cần *</label><input class="field-input" id="bs-sl" type="number" min="1" value="1"></div>
      <div><label class="field-label">Giá ước tính (VND)</label><input class="field-input" id="bs-gia" type="number" min="0" value="0"></div></div>
      <div class="fgroup"><label class="field-label">Lý do / Mục đích sử dụng *</label><textarea class="field-input" id="bs-lydo" placeholder="Mô tả lý do cần bổ sung thiết bị này..."></textarea></div>
      <button class="btn btn-primary" onclick="saveBoSung()">📤 Gửi yêu cầu bổ sung</button>
    </div>
    <div class="card">
      <div class="card-title">Yêu cầu bổ sung của bạn</div>
      <div class="tbl-wrap"><table><thead><tr><th>Mã</th><th>Loại thiết bị</th><th>SL</th><th>Giá ước tính</th><th>Lý do</th><th>Ngày tạo</th><th>TT</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7"><div class="empty"><div class="empty-icon">➕</div><p>Chưa có yêu cầu bổ sung nào</p></div></td></tr>'}</tbody></table></div>
    </div>`;
}
function saveBoSung(){
  const loai=v('bs-loai'),sl=parseInt(v('bs-sl'))||0,gia=parseInt(v('bs-gia'))||0,lydo=v('bs-lydo');
  if(!loai||sl<1||!lydo){toast('Vui lòng điền đầy đủ thông tin','error');return;}
  const exists=S.thietbi.some(t=>t.ten.toLowerCase().includes(loai.toLowerCase())||t.loai.toLowerCase().includes(loai.toLowerCase()));
  if(exists){toast('Loại thiết bị này đã có trong hệ thống. Vui lòng kiểm tra lại.','error');return;}
  S.seq_counter.bs=(S.seq_counter.bs||0)+1;
  const id='BS'+String(S.seq_counter.bs).padStart(3,'0');
  S.bo_sung.push({id,loai_tb:loai,so_luong:sl,du_kien_gia:gia,ly_do:lydo,nguoi_tao:currentUser,ngay_tao:today(),trang_thai:'Đang chờ duyệt'});
  saveStore();toast('Đã gửi yêu cầu bổ sung '+id+' — Chờ quản lý phê duyệt');pgBoSungTB();
}

/* ═══════════════════════════════
   BÁO CÁO
═══════════════════════════════ */
function pgBaoCao(){
  document.getElementById('main').innerHTML=`
    <div class="page-hd"><h2>📊 Báo cáo & Thống kê</h2></div>
    <div class="ptabs">
      <div class="ptab active" onclick="switchTab(this,'bc-tao')">Tạo báo cáo</div>
      <div class="ptab" onclick="switchTab(this,'bc-ds')">Danh sách báo cáo</div>
      <div class="ptab" onclick="switchTab(this,'bc-tke')">Thống kê nhanh</div>
    </div>
    <div id="bc-tao" class="ptab-content active">
      <div class="card" style="max-width:520px">
        <div class="card-title">Tạo báo cáo mới</div>
        <div class="fgroup"><label class="field-label">Loại báo cáo *</label><select class="field-input" id="bc-loai"><option>Báo cáo nhập kho</option><option>Báo cáo xuất kho</option><option>Báo cáo kiểm kê</option><option>Báo cáo bảo trì</option><option>Báo cáo tổng hợp thiết bị</option><option>Báo cáo tài chính</option></select></div>
        <div class="frow"><div><label class="field-label">Từ ngày</label><input class="field-input" id="bc-from" type="date" value="2025-01-01"></div>
        <div><label class="field-label">Đến ngày</label><input class="field-input" id="bc-to" type="date" value="${today()}"></div></div>
        <div class="fgroup"><label class="field-label">Ghi chú</label><input class="field-input" id="bc-gc" placeholder="Ghi chú báo cáo..."></div>
        <button class="btn btn-primary" onclick="taoBaoCao()">📊 Tạo và lưu báo cáo</button>
      </div>
    </div>
    <div id="bc-ds" class="ptab-content">${renderDSBaoCao()}</div>
    <div id="bc-tke" class="ptab-content">${renderThongKe()}</div>`;
}
function renderDSBaoCao(){
  const rows=S.bao_cao.slice().reverse().map(b=>`<tr>
    <td><b>${b.id}</b></td><td>${b.loai}</td><td>${b.tu_ngay} → ${b.den_ngay}</td>
    <td>${b.nguoi_tao}</td><td>${b.ngay_tao}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="xemBaoCao('${b.id}')">👁️ Xem</button></td>
  </tr>`).join('');
  return `<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Mã BC</th><th>Loại</th><th>Khoảng thời gian</th><th>Người tạo</th><th>Ngày tạo</th><th></th></tr></thead>
  <tbody>${rows||'<tr><td colspan="6"><div class="empty"><div class="empty-icon">📊</div><p>Chưa có báo cáo nào</p></div></td></tr>'}</tbody></table></div></div>`;
}
function renderThongKe(){
  const totalTB=S.thietbi.length;
  const totalSL=S.thietbi.reduce((a,b)=>a+b.so_luong,0);
  const totalKho=S.thietbi.reduce((a,b)=>a+b.so_luong_kho,0);
  const totalNhap=S.nhap_kho.reduce((a,b)=>a+b.so_luong,0);
  const totalXuat=S.xuat_kho.reduce((a,b)=>a+b.so_luong,0);
  const totalYC=S.yeu_cau.length;
  const ycDuyet=S.yeu_cau.filter(y=>y.trang_thai==='Đã duyệt'||y.trang_thai==='Đã xuất kho').length;
  const tbHong=S.tb_hong.filter(t=>t.trang_thai!=='Hoàn thành').length;
  return `<div class="stats-row">
    <div class="stat blue"><div class="stat-num">${totalTB}</div><div class="stat-lbl">Loại thiết bị</div></div>
    <div class="stat green"><div class="stat-num">${totalKho}</div><div class="stat-lbl">SL trong kho</div></div>
    <div class="stat amber"><div class="stat-num">${totalNhap}</div><div class="stat-lbl">Tổng đã nhập</div></div>
    <div class="stat purple"><div class="stat-num">${totalXuat}</div><div class="stat-lbl">Tổng đã xuất</div></div>
  </div>
  <div class="stats-row">
    <div class="stat blue"><div class="stat-num">${totalYC}</div><div class="stat-lbl">Tổng yêu cầu</div></div>
    <div class="stat green"><div class="stat-num">${ycDuyet}</div><div class="stat-lbl">YC đã duyệt</div></div>
    <div class="stat red"><div class="stat-num">${tbHong}</div><div class="stat-lbl">TB đang hỏng</div></div>
    <div class="stat amber"><div class="stat-num">${S.bao_tri.length}</div><div class="stat-lbl">Lịch bảo trì</div></div>
  </div>`;
}
function taoBaoCao(){
  const loai=v('bc-loai'),from=v('bc-from'),to=v('bc-to'),gc=v('bc-gc');
  if(!from||!to){toast('Vui lòng chọn khoảng thời gian','error');return;}
  S.seq_counter.bc=(S.seq_counter.bc||0)+1;
  const id='BC'+String(S.seq_counter.bc).padStart(3,'0');
  S.bao_cao.push({id,loai,tu_ngay:from,den_ngay:to,nguoi_tao:currentUser,ngay_tao:today(),ghichu:gc});
  saveStore();toast('Đã tạo và lưu báo cáo '+id);pgBaoCao();
}
function xemBaoCao(id){
  const b=S.bao_cao.find(x=>x.id===id);if(!b)return;
  openModal(`<div class="modal"><div class="modal-hd"><h3>📊 Báo cáo — ${b.id}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="info-grid">
      <div class="info-field"><label>Loại báo cáo</label><p>${b.loai}</p></div>
      <div class="info-field"><label>Người tạo</label><p>${b.nguoi_tao}</p></div>
      <div class="info-field"><label>Từ ngày</label><p>${b.tu_ngay}</p></div>
      <div class="info-field"><label>Đến ngày</label><p>${b.den_ngay}</p></div>
    </div>
    <div style="margin-top:1rem;padding:1rem;background:#f8fafc;border-radius:var(--r);font-size:13px;color:var(--text2)">
      <b>Tóm tắt:</b> Báo cáo ${b.loai} từ ${b.tu_ngay} đến ${b.den_ngay}.<br>
      ${b.ghichu?`<br><b>Ghi chú:</b> ${b.ghichu}`:''}
    </div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Đóng</button></div></div>`);
}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function v(id){return(document.getElementById(id)?.value||'').trim();}
function switchTab(el,targetId){
  const parent=el.closest('.ptab-content')?.parentElement||el.parentElement?.nextElementSibling?.parentElement||document.getElementById('main');
  const ptabs=el.parentElement;
  ptabs.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  // find all ptab-content siblings
  const contents=parent.querySelectorAll('.ptab-content');
  contents.forEach(c=>{c.classList.toggle('active',c.id===targetId);});
}

// Enter key on login
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login').style.display!=='none')login();});
</script>
</body>
